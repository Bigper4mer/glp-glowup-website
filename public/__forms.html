<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Netlify Forms</title>
  </head>
  <body>
    <form name="fit-form" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="fit-form" />
      <input type="text" name="bot-field" />
      <input type="text" name="full_name" />
      <input type="text" name="email" />
      <input type="text" name="phone" />
      <input type="text" name="preferred_contact_method" />
      <input type="text" name="service_area_fit" />
      <input type="text" name="location" />
      <input type="text" name="heard_about" />
      <input type="text" name="glp1_status" />
      <input type="text" name="primary_goal" />
      <input type="text" name="biggest_challenge" />
      <input type="text" name="coaching_openness" />
      <input type="text" name="readiness_level" />
      <input type="text" name="checkin_tolerance" />
      <input type="text" name="activity_level" />
      <input type="text" name="pain_limitations" />
      <input type="text" name="limitation_details" />
      <input type="text" name="preferred_tier" />
      <input type="text" name="anything_else" />
      <input type="text" name="cta_source" />
      <input type="text" name="page_path" />
    </form>
  </body>
</html>
